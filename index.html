<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marsh Serpent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="game-card" aria-label="Snake game">
      <header class="scene-meta">
        <div class="brand-plaque">
          <p class="brand-kicker">Field Study</p>
          <h1>Marsh Serpent</h1>
        </div>

        <aside class="scoreboard" aria-label="Game stats">
          <p class="score-heading">Score</p>
          <strong id="score" class="score-main">0</strong>
          <dl class="score-meta">
            <div>
              <dt>Best</dt>
              <dd id="best-score">0</dd>
            </div>
            <div>
              <dt>Status</dt>
              <dd id="status-text">Idle</dd>
            </div>
          </dl>
        </aside>
      </header>

      <section class="stage-shell">
        <div class="canvas-frame">
          <canvas id="game-canvas" aria-label="Snake game canvas"></canvas>

          <div id="start-overlay" class="overlay overlay-visible">
            <div class="overlay-panel">
              <p class="overlay-kicker">Wetland chase</p>
              <h2>潜入草地，追猎青蛙</h2>
              <p class="overlay-copy">
                方向键或 WASD 控制蛇的走向。追上草丛里的青蛙，避开边界与自己的身体。
              </p>
              <button id="start-button" class="primary-button" type="button">开始狩猎</button>
            </div>
          </div>

          <div id="game-over-overlay" class="overlay" aria-hidden="true">
            <div class="overlay-panel">
              <p class="overlay-kicker">Trail lost</p>
              <h2>猎踪中断</h2>
              <p class="overlay-copy">本局得分 <span id="final-score">0</span></p>
              <button id="restart-button" class="primary-button" type="button">重新追踪</button>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer-bar">
        <p>方向键 / WASD 转向，空格重新开始</p>
        <div class="touch-controls" aria-label="Touch controls">
          <button class="touch-button" type="button" data-direction="up" aria-label="Up">↑</button>
          <div class="touch-row">
            <button class="touch-button" type="button" data-direction="left" aria-label="Left">←</button>
            <button class="touch-button" type="button" data-direction="down" aria-label="Down">↓</button>
            <button class="touch-button" type="button" data-direction="right" aria-label="Right">→</button>
          </div>
        </div>
      </footer>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
